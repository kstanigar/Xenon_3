name: Game Integrity Check

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  check-game-html:
    runs-on: ubuntu-latest
    name: Verify game.html functions

    steps:
      - uses: actions/checkout@v4

      - name: Check required functions exist
        run: |
          FAIL=0
          FILE="game.html"
          check() {
            if grep -q "$1" "$FILE"; then
              echo "✅ $FILE: $1"
            else
              echo "❌ MISSING in $FILE: $1"
              FAIL=1
            fi
          }
          check "function startFromCard"
          check "function playAgain"
          check "function showSurveyBanner"
          check "function collapseSurveyBanner"
          check "function submitSurvey"
          check "function dismissSurvey"
          check "function playerTakeDamage"
          check "function shouldShowSurvey"
          check "function buildBugButtonHTML"
          check "function openBugReport"
          check "function submitBugReport"
          check "function fireEvent"
          check "if (playerBlinking)"
          check "game_complete"
          check "'outcome': 'victory'"
          check "'outcome': 'death'"
          check "'outcome': 'abandoned'"
          check "bug_report_submitted"

          # Player ID System (leaderboard security - Mar 2026)
          check "function generateUUID"
          check "function getPlayerId"
          check "var PLAYER_ID"

          # Formation Morphing System (signature mechanic - Mar 2026)
          check "function updateMorphingFormation"
          check "function spawnMorphingFormation"
          check "var formationEnteredTime"

          # Barrier System (all 12 levels - Mar 2026)
          check "function spawnBarrier"
          check "function updateBarriers"

          # Shield Visual Feedback (player feedback - Mar 2026)
          check "shieldFlashFrames"
          check "shieldWobble"

          # Power-Up Cycle System (timer-based spawning - Mar 2026)
          check "var powerupSpawnsThisCycle"
          check "function trySpawnPowerup"

          # Top 25 Leaderboard Modal (UI/UX - Mar 2026)
          check "function showFullLeaderboard"
          check "function closeLeaderboardModal"
          check "function playAgainFromModal"
          check "function leaveGameFromModal"

          # AI Agent v1.0 (adaptive difficulty - Apr 2026)
          check "var TIER_CONFIG"
          check "scoreMultiplier"
          check "function getCurrentPhase"
          check "function getTierMultiplier"
          check "function addScore"
          check "function decreaseTier"
          check "function increaseTier"
          check "var currentTier"
          check "var cyclesCompleted"
          check "var speedLocked"
          check "ai_difficulty_adjusted"

          # Player Scorecard Modal (session stats - Apr 2026)
          check "function buildScorecardHTML"
          check "function showScorecardModal"
          check "function closeScorecardModal"
          check "var enemiesKilled"
          check "var powerupsCollected"
          check "scorecard_viewed"

          # Ko-fi Monetization (tipping support - Apr 2026)
          check "function buildKofiButtonHTML"

          if [ $FAIL -ne 0 ]; then exit 1; fi

      - name: Check banned patterns are absent
        run: |
          FAIL=0
          FILE="game.html"
          banned() {
            if grep -qE "$1" "$FILE"; then
              echo "❌ BANNED pattern found in $FILE: $1"
              FAIL=1
            else
              echo "✅ $FILE clean: $1"
            fi
          }
          banned "buildSurveyHTML"
          banned "'phase'.*'standard'"
          if [ $FAIL -ne 0 ]; then exit 1; fi

      # ════════════════════════════════════════════════════════════════
      # Production Code Quality Checks (Apr 2026 - Safeguards)
      # ════════════════════════════════════════════════════════════════

      - name: Check for console.log statements
        run: |
          if grep -r "console\.log" game.html game_mobile.html index.html; then
            echo "❌ ERROR: console.log found in production code"
            exit 1
          fi
          echo "✅ No console.log statements found"

      - name: Check for debugger statements
        run: |
          if grep -r "debugger" game.html game_mobile.html index.html; then
            echo "❌ ERROR: debugger statement found in production code"
            exit 1
          fi
          echo "✅ No debugger statements found"

      - name: Check for unresolved TODO/FIXME
        run: |
          TODO_COUNT=$(grep -r "TODO\|FIXME" game.html game_mobile.html index.html | wc -l)
          if [ $TODO_COUNT -gt 0 ]; then
            echo "⚠️ WARNING: $TODO_COUNT TODO/FIXME comments found"
            grep -r "TODO\|FIXME" game.html game_mobile.html index.html
          fi
          echo "ℹ️ TODO/FIXME check complete"

      - name: Check large asset files
        run: |
          find assets/ -type f -size +5M -exec ls -lh {} \; | while read line; do
            echo "⚠️ WARNING: Large file detected: $line"
          done
          echo "✅ File size check complete"

      - name: Verify desktop/mobile function parity
        run: |
          DESKTOP_FUNCTIONS=$(grep -o "function [a-zA-Z_][a-zA-Z0-9_]*" game.html | sort | uniq | wc -l)
          MOBILE_FUNCTIONS=$(grep -o "function [a-zA-Z_][a-zA-Z0-9_]*" game_mobile.html | sort | uniq | wc -l)
          echo "Desktop functions: $DESKTOP_FUNCTIONS"
          echo "Mobile functions: $MOBILE_FUNCTIONS"
          DIFF=$((DESKTOP_FUNCTIONS - MOBILE_FUNCTIONS))
          DIFF=${DIFF#-}  # absolute value
          if [ $DIFF -gt 5 ]; then
            echo "⚠️ WARNING: Desktop and mobile function counts differ by $DIFF"
          fi
          echo "✅ Desktop/mobile parity check complete"

  check-game-mobile-html:
    runs-on: ubuntu-latest
    name: Verify game_mobile.html functions

    steps:
      - uses: actions/checkout@v4

      - name: Check required functions exist
        run: |
          FAIL=0
          FILE="game_mobile.html"
          check() {
            if grep -q "$1" "$FILE"; then
              echo "✅ $FILE: $1"
            else
              echo "❌ MISSING in $FILE: $1"
              FAIL=1
            fi
          }
          check "function startFromCard"
          check "function playAgain"
          check "function showSurveyBanner"
          check "function collapseSurveyBanner"
          check "function submitSurvey"
          check "function dismissSurvey"
          check "function playerTakeDamage"
          check "function shouldShowSurvey"
          check "function buildBugButtonHTML"
          check "function openBugReport"
          check "function submitBugReport"
          check "function fireEvent"
          check "if (playerBlinking)"
          check "game_complete"
          check "'outcome': 'victory'"
          check "'outcome': 'death'"
          check "'outcome': 'abandoned'"
          check "bug_report_submitted"

          # Player ID System (leaderboard security - Mar 2026)
          check "function generateUUID"
          check "function getPlayerId"
          check "var PLAYER_ID"

          # Formation Morphing System (signature mechanic - Mar 2026)
          check "function updateMorphingFormation"
          check "function spawnMorphingFormation"
          check "var formationEnteredTime"

          # Barrier System (all 12 levels - Mar 2026)
          check "function spawnBarrier"
          check "function updateBarriers"

          # Shield Visual Feedback (player feedback - Mar 2026)
          check "shieldFlashFrames"
          check "shieldWobble"

          # Power-Up Cycle System (timer-based spawning - Mar 2026)
          check "var powerupSpawnsThisCycle"
          check "function trySpawnPowerup"

          # Top 25 Leaderboard Modal (UI/UX - Mar 2026)
          check "function showFullLeaderboard"
          check "function closeLeaderboardModal"
          check "function playAgainFromModal"
          check "function leaveGameFromModal"

          # AI Agent v1.0 (adaptive difficulty - Apr 2026)
          check "var TIER_CONFIG"
          check "scoreMultiplier"
          check "function getCurrentPhase"
          check "function getTierMultiplier"
          check "function addScore"
          check "function decreaseTier"
          check "function increaseTier"
          check "var currentTier"
          check "var cyclesCompleted"
          check "var speedLocked"
          check "ai_difficulty_adjusted"

          # Player Scorecard Modal (session stats - Apr 2026)
          check "function buildScorecardHTML"
          check "function showScorecardModal"
          check "function closeScorecardModal"
          check "var enemiesKilled"
          check "var powerupsCollected"
          check "scorecard_viewed"

          # Ko-fi Monetization (tipping support - Apr 2026)
          check "function buildKofiButtonHTML"

          if [ $FAIL -ne 0 ]; then exit 1; fi

      - name: Check banned patterns are absent
        run: |
          FAIL=0
          FILE="game_mobile.html"
          banned() {
            if grep -qE "$1" "$FILE"; then
              echo "❌ BANNED pattern found in $FILE: $1"
              FAIL=1
            else
              echo "✅ $FILE clean: $1"
            fi
          }
          banned "buildSurveyHTML"
          banned "'phase'.*'standard'"
          if [ $FAIL -ne 0 ]; then exit 1; fi
