<!--
  ============================================================
  index.html — NON-X Main Menu
  ============================================================
  Entry point for the NON-X web game. Presents the player with
  platform selection (Computer / Mobile), settings toggles, and
  a Play button that navigates to the appropriate game file.

  Navigation targets:
    • game.html        — Desktop build (800×600, keyboard controls)
    • game_mobile.html — Mobile build (480×1040, touch controls)

  Persistent state (localStorage keys):
    • nonex_platform   — Last selected platform ('computer' | 'mobile')
    • nonex_music      — Background music preference ('on' | 'off')
    • nonex_analytics  — Analytics consent ('on' | 'off')
    • nonex_event_queue — Buffered analytics events (JSON array, max 200)

  Session state (sessionStorage keys):
    • nonex_session    — Unique ID for the current browser tab session

  Analytics:
    Set ANALYTICS_ENDPOINT to a POST-accepting URL to stream events.
    Leave as '' to buffer locally only (useful for debugging via
    localStorage.getItem('nonex_event_queue')).

  Dependencies: None (no external libraries or frameworks).
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9ECFZ9JBE5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-9ECFZ9JBE5');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NON-X</title>
  <style>
    /* Reset — consistent box model across all elements */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Prevent pull-to-refresh (mobile) and swipe-to-navigate (desktop touchpads) */
    html,
    body {
      overscroll-behavior: none;
      touch-action: pan-y;
    }

    /* Full-screen layout; scrollable so leaderboard expansion never clips content */
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow-y: auto;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* ── Starfield ──────────────────────────────────────────────────────────
       Full-screen canvas rendered behind all menu content.
       Animated via requestAnimationFrame in the Starfield IIFE below.       */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      /* Behind menu content */
      pointer-events: none;
      /* Never intercepts clicks */
    }

    /* ── Content wrapper ────────────────────────────────────────────────────
       Sits above the starfield canvas via z-index.
       min-height + justify-content keeps items centred when content is short;
       padding ensures breathing room when the page needs to scroll.         */
    .menu-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      min-height: 100vh;
      justify-content: center;
      padding: 48px 20px;
      box-sizing: border-box;
    }

    /* ── Title ──────────────────────────────────────────────────────────────
       Fluid font size: clamp ensures readability from mobile to large screens.
       Cyan glow pulses via CSS animation for visual depth.                  */
    .title {
      font-size: clamp(52px, 12vw, 96px);
      font-weight: bold;
      letter-spacing: 14px;
      text-transform: uppercase;
      color: #00FFFF;
      text-shadow:
        0 0 18px #00FFFF,
        0 0 40px #00FFFF,
        0 0 80px rgba(0, 255, 255, 0.4);
      animation: titlePulse 3s ease-in-out infinite;
    }

    /* Subtle pulsing glow — breathes between two intensity levels */
    @keyframes titlePulse {

      0%,
      100% {
        text-shadow: 0 0 18px #00FFFF, 0 0 40px #00FFFF, 0 0 80px rgba(0, 255, 255, 0.4);
      }

      50% {
        text-shadow: 0 0 28px #00FFFF, 0 0 60px #00FFFF, 0 0 110px rgba(0, 255, 255, 0.6);
      }
    }

    /* ── Platform buttons ───────────────────────────────────────────────────
       Two-button group for selecting Computer vs Mobile build.
       Active selection indicated by the .selected class.                    */
    .platform-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .platform-btn {
      width: 200px;
      padding: 18px 0;
      font-size: 17px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 1px;
      border: 2px solid #444;
      background: transparent;
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }

    /* Sub-label text inside each platform button */
    .platform-btn span {
      display: block;
      font-size: 12px;
      font-weight: normal;
      letter-spacing: 0;
      color: #666;
      margin-top: 4px;
      transition: color 0.2s;
    }

    /* Hover and selected state share the same cyan highlight style */
    .platform-btn:hover,
    .platform-btn.selected {
      border-color: #00FFFF;
      color: #00FFFF;
      background: rgba(0, 255, 255, 0.08);
      text-shadow: 0 0 8px #00FFFF;
      box-shadow: 0 0 16px rgba(0, 255, 255, 0.25);
    }

    .platform-btn.selected span,
    .platform-btn:hover span {
      color: rgba(0, 255, 255, 0.7);
    }

    /* ── Settings bar ────────────────────────────────────────────────────────
       Single compact row housing all three toggle switches.                  */
    .settings-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 20px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      flex-wrap: wrap;
    }

    /* Each toggle item: label on top, pill switch below */
    .toggle-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-item-label {
      font-size: 13px;
      color: #aaa;
      white-space: nowrap;
    }

    /* ── Pill switch ────────────────────────────────────────────────────────
       Custom checkbox styled as a sliding pill toggle.
       The hidden <input> drives state; the .slider is the visual element.   */
    .switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }

    /* Hide the native checkbox — interaction handled by the parent <label> */
    .switch input {
      display: none;
    }

    /* The pill track */
    .slider {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: #333;
      transition: background 0.2s;
      cursor: pointer;
    }

    /* The sliding knob inside the pill */
    .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #888;
      transition: transform 0.2s, background 0.2s;
    }

    /* Checked state: track turns translucent green */
    input:checked+.slider {
      background: rgba(0, 255, 136, 0.25);
    }

    /* Checked state: knob slides right and glows green */
    input:checked+.slider::before {
      transform: translateX(20px);
      background: #00FF88;
      box-shadow: 0 0 8px #00FF88;
    }

    /* ── Play button ────────────────────────────────────────────────────────
       Primary CTA. Navigates to the selected game file on click.            */
    #playBtn {
      padding: 18px 80px;
      font-size: 20px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: #00FFFF;
      color: #000;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.5);
      transition: all 0.2s;
    }

    #playBtn:hover {
      background: #fff;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.9);
      transform: scale(1.04);
    }

    #playBtn:active {
      transform: scale(0.98);
      /* Tactile press feedback */
    }
  </style>

  <!-- Firebase SDK — read-only leaderboard access -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDumeBRk__-lcKFJA2WLD7Wi-0y6OuFZlo",
      authDomain: "nonx---game.firebaseapp.com",
      projectId: "nonx---game",
      storageBucket: "nonx---game.firebasestorage.app",
      messagingSenderId: "404220834268",
      appId: "1:404220834268:web:6cb71367bf62569ad5df19"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.firebaseGetTopScores = async function () {
      try {
        const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
        const snapshot = await getDocs(q);
        return snapshot.docs.map(function (doc) { return doc.data(); });
      } catch (e) {
        console.error("Firebase fetch error:", e);
        return [];
      }
    };
  </script>
</head>

<body>

  <!-- Starfield background canvas — drawn behind all menu elements -->
  <canvas id="starfield"></canvas>

  <!-- Main menu content — layered above the starfield via z-index -->
  <div class="menu-wrap">

    <!-- Game title -->
    <div class="title">NON-X</div>

    <!-- Global Leaderboard dropdown -->
    <div id="leaderboardDropdown" style="width:420px;max-width:96vw;">
      <div id="leaderboardTeaser" onclick="toggleLeaderboard()" style="background:rgba(0,255,255,0.05);border:1px solid #1e3a3a;border-radius:8px;
               padding:13px 18px;display:flex;align-items:center;justify-content:space-between;
               cursor:pointer;user-select:none;transition:border-color 0.2s,background 0.2s;"
        onmouseover="this.style.borderColor='#00FFFF';this.style.background='rgba(0,255,255,0.08)'"
        onmouseout="this.style.borderColor='#1e3a3a';this.style.background='rgba(0,255,255,0.05)'">
        <span style="color:#00FFFF;font-size:14px;font-weight:bold;letter-spacing:0.3px;">
          🏆 Global Leaderboard
        </span>
        <span id="leaderboardChevron" style="color:#00FFFF;font-size:20px;margin-left:12px;
                 transition:transform 0.35s;display:inline-block;transform:rotate(180deg);">&#8964;</span>
      </div>
      <div id="leaderboardPanel" style="background:#0a1515;border:1px solid #1e3a3a;border-top:none;
               border-radius:0 0 8px 8px;overflow:hidden;
               max-height:480px;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1);">
        <div id="leaderboardContent" style="padding:14px 20px 18px;text-align:center;color:#aaa;font-size:13px;">
          Loading...
        </div>
      </div>
    </div>
    <!-- Platform selector: determines which game file is loaded on Play -->
    <div class="platform-group">
      <button class="platform-btn selected" id="btnComputer" onclick="selectPlatform('computer')">
        Computer
      </button>
      <button class="platform-btn" id="btnMobile" onclick="selectPlatform('mobile')">
        Mobile
      </button>
    </div>

    <!-- Settings bar: compact single-row toggles -->
    <div class="settings-bar">

      <label class="toggle-item" for="musicSwitch" title="Background music during gameplay">
        <span class="toggle-item-label">Music</span>
        <div class="switch">
          <input type="checkbox" id="musicSwitch" checked onchange="onMusicToggle()" />
          <div class="slider"></div>
        </div>
      </label>

      <label class="toggle-item" for="movementSwitch" title="Enable up/down controls in addition to left/right">
        <span class="toggle-item-label">Full Movement</span>
        <div class="switch">
          <input type="checkbox" id="movementSwitch" checked onchange="onMovementToggle()" />
          <div class="slider"></div>
        </div>
      </label>

      <label class="toggle-item" for="analyticsSwitch" title="Help improve the game — no personal info collected">
        <span class="toggle-item-label">Analytics</span>
        <div class="switch">
          <input type="checkbox" id="analyticsSwitch" onchange="onAnalyticsToggle()" />
          <div class="slider"></div>
        </div>
      </label>

    </div>


    <!-- Play button -->
    <button id="playBtn" onclick="launchGame()">Play</button>

  </div>

  <script>
    // ============================================================
    // STARFIELD
    // ============================================================
    // Self-contained IIFE so starfield variables don't pollute
    // the global scope. Runs its own requestAnimationFrame loop
    // independently of the game loop.
    (function () {
      var c = document.getElementById('starfield');
      var ctx = c.getContext('2d');
      var stars = [];
      var NUM_STARS = 160; // Total number of particles in the field

      /**
       * Resizes the canvas to fill the viewport.
       * Called on init and whenever the window is resized.
       */
      function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      }

      /**
       * Populates the stars array with randomly distributed particles.
       * Each star has a position (x, y), radius (r), fall speed, and opacity (alpha).
       */
      function initStars() {
        stars = [];
        for (var i = 0; i < NUM_STARS; i++) {
          stars.push({
            x: Math.random() * c.width,
            y: Math.random() * c.height,
            r: Math.random() * 1.5 + 0.3,   // Radius: 0.3–1.8px
            speed: Math.random() * 0.4 + 0.1,   // Fall speed: 0.1–0.5px per frame
            alpha: Math.random() * 0.6 + 0.3    // Opacity: 0.3–0.9
          });
        }
      }

      /**
       * Main animation loop. Clears the canvas and redraws all stars each frame.
       * Stars that fall off the bottom are recycled to a random position at the top.
       */
      function tick() {
        ctx.clearRect(0, 0, c.width, c.height);
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          s.y += s.speed;
          // Recycle star to the top when it exits the bottom edge
          if (s.y > c.height) { s.y = 0; s.x = Math.random() * c.width; }
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
          ctx.fill();
        }
        requestAnimationFrame(tick);
      }

      // Re-init on resize to avoid stretched/clipped stars
      window.addEventListener('resize', function () { resize(); initStars(); });
      resize();
      initStars();
      tick();
    })();

    // ============================================================
    // ANALYTICS
    // ============================================================
    // Lightweight event tracking system. Events are always buffered
    // to localStorage for offline access/debugging. If ANALYTICS_ENDPOINT
    // is set, events are also POSTed to that URL in real time.
    //
    // To enable: set ANALYTICS_ENDPOINT to your server's POST URL.
    // To inspect buffered events locally:
    //   JSON.parse(localStorage.getItem('nonex_event_queue'))
    var ANALYTICS_ENDPOINT = ''; // e.g. 'https://your-server.com/events'

    /**
     * Generates a unique ID from the current timestamp and random entropy.
     * Used for session IDs. Format: base36(timestamp) + random suffix.
     * @returns {string} A short unique identifier string.
     */
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    // Unique session ID scoped to the current browser tab.
    // Persists across page reloads within the tab but resets on tab close.
    var sessionId = sessionStorage.getItem('nonex_session');
    if (!sessionId) {
      sessionId = generateId();
      sessionStorage.setItem('nonex_session', sessionId);
    }

    /**
     * Records a named analytics event with optional metadata.
     * Requires user consent (nonex_analytics === 'on') for all events
     * except 'analytics_toggled', which is always recorded so the
     * opt-in moment itself can be captured.
     *
     * @param {string} name - The event name (e.g. 'play_clicked').
     * @param {Object} [data] - Optional key/value metadata for the event.
     */
    function trackEvent(name, data) {
      // Gate on consent — null means first visit (default ON)
      var analyticsValue = localStorage.getItem('nonex_analytics');
      var hasConsent = (analyticsValue === 'on' || analyticsValue === null);
      if (!hasConsent && name !== 'analytics_toggled') return;

      // Send to Google Analytics
      if (typeof gtag !== 'undefined') {
        gtag('event', name, data || {});
      }
    }

    // ============================================================
    // PREFERENCES
    // ============================================================
    // User preferences are persisted to localStorage so they are
    // restored on the next visit. Defaults: Computer platform, music on,
    // analytics on (opt-out available).

    /** Currently selected platform ('computer' | 'mobile'). */
    var selectedPlatform = 'computer';

    /**
     * Updates the active platform selection and persists the preference.
     * Fires a 'platform_selected' analytics event when the value changes.
     *
     * @param {string} p - Platform identifier: 'computer' or 'mobile'.
     */
    // ============================================================
    // LEADERBOARD DROPDOWN
    // ============================================================
    var leaderboardOpen = true;
    var leaderboardLoaded = false;

    function renderLeaderboard(top10) {
      var content = document.getElementById('leaderboardContent');
      if (!content) return;
      if (!top10 || top10.length === 0) {
        content.innerHTML = "<div style='color:#aaa;font-size:13px;padding:4px 0;'>No scores yet — be the first!</div>";
        return;
      }
      // Two-column grid: entries laid out left column (1-5) then right column (6-10).
      // flex-wrap means narrow screens fall back to a single column automatically.
      var localBest = parseInt(localStorage.getItem('nonx_submitted_score') || '0', 10);
      var half = Math.ceil(top10.length / 2);
      var cols = ['', ''];
      for (var i = 0; i < top10.length; i++) {
        var entry = top10[i];
        var igText = entry.instagram && entry.instagram !== 'Anonymous'
          ? '@' + entry.instagram : 'Anonymous';
        var isYours = localBest > 0 && entry.score === localBest;
        var rowStyle = isYours ? "color:#00FFFF;font-weight:bold;" : "color:#ddd;";
        var col = i < half ? 0 : 1;
        cols[col] += "<div style='" + rowStyle + "font-size:13px;margin-bottom:5px;'>";
        cols[col] += (i + 1) + ". <strong>" + entry.score + "</strong> ";
        cols[col] += "<span style='color:#888;font-size:12px;'>" + igText + "</span>";
        if (isYours) cols[col] += " <span style='font-size:11px;color:#00FFFF;'>← you</span>";
        cols[col] += "</div>";
      }
      var html = "<div style='display:flex;flex-wrap:wrap;justify-content:center;gap:0 28px;text-align:left;padding:4px 0;'>";
      html += "<div style='min-width:170px;'>" + cols[0] + "</div>";
      html += "<div style='min-width:170px;'>" + cols[1] + "</div>";
      html += "</div>";
      content.innerHTML = html;
    }

    function toggleLeaderboard() {
      leaderboardOpen = !leaderboardOpen;
      var panel = document.getElementById('leaderboardPanel');
      var chev = document.getElementById('leaderboardChevron');
      panel.style.maxHeight = leaderboardOpen ? '480px' : '0';
      if (chev) chev.style.transform = leaderboardOpen ? 'rotate(180deg)' : 'rotate(0deg)';

      // Fetch scores on first open
      if (leaderboardOpen && !leaderboardLoaded) {
        leaderboardLoaded = true;
        if (typeof window.firebaseGetTopScores === 'function') {
          window.firebaseGetTopScores().then(renderLeaderboard);
        } else {
          // Firebase module may still be loading — retry once after a short delay
          setTimeout(function () {
            if (typeof window.firebaseGetTopScores === 'function') {
              window.firebaseGetTopScores().then(renderLeaderboard);
            } else {
              var content = document.getElementById('leaderboardContent');
              if (content) content.innerHTML = "<div style='color:#aaa;font-size:13px;'>Leaderboard unavailable.</div>";
            }
          }, 1200);
        }
      }
    }

    function selectPlatform(p) {
      var prev = selectedPlatform;
      selectedPlatform = p;
      document.getElementById('btnComputer').classList.toggle('selected', p === 'computer');
      document.getElementById('btnMobile').classList.toggle('selected', p === 'mobile');
      savePrefs();
      if (prev !== p) {
        trackEvent('platform_selected', { platform: p });
      }
    }

    /**
     * Writes all current preference values to localStorage.
     * Called after any preference changes to ensure persistence.
     */
    function savePrefs() {
      localStorage.setItem('nonex_music', document.getElementById('musicSwitch').checked ? 'on' : 'off');
      localStorage.setItem('nonex_movement', document.getElementById('movementSwitch').checked ? 'on' : 'off');
      localStorage.setItem('nonex_analytics', document.getElementById('analyticsSwitch').checked ? 'on' : 'off');
      localStorage.setItem('nonex_platform', selectedPlatform);
    }

    /**
     * Handles the Music toggle change event.
     * Saves the updated preference and records an analytics event.
     */
    function onMusicToggle() {
      var val = document.getElementById('musicSwitch').checked ? 'on' : 'off';
      savePrefs();
      trackEvent('music_toggled', { value: val });
    }

    /**
     * Handles the Full Movement toggle change event.
     * Saves preference and fires analytics. 'B' = full movement (on), 'A' = horizontal only (off).
     */
    function onMovementToggle() {
      var val = document.getElementById('movementSwitch').checked ? 'on' : 'off';
      savePrefs();
      trackEvent('movement_toggled', { value: val, movement_group: val === 'on' ? 'B' : 'A' });
    }

    /**
     * Handles the Analytics toggle change event.
     * Saves consent to localStorage before calling trackEvent, so the
     * consent status is already correct when trackEvent reads it.
     */
    function onAnalyticsToggle() {
      var val = document.getElementById('analyticsSwitch').checked ? 'on' : 'off';
      savePrefs();
      trackEvent('analytics_toggled', { value: val });
    }

    /**
     * Restores saved preferences from localStorage on page load.
     * Falls back to defaults if no saved values exist.
     */
    function loadPrefs() {
      var music = localStorage.getItem('nonex_music');
      var analytics = localStorage.getItem('nonex_analytics');
      var platform = localStorage.getItem('nonex_platform');

      if (music !== null) document.getElementById('musicSwitch').checked = (music === 'on');
      // Default Full Movement to ON for first-time visitors
      var movement = localStorage.getItem('nonex_movement');
      document.getElementById('movementSwitch').checked = (movement === 'on' || movement === null);
      // Default analytics to ON for first-time visitors
      document.getElementById('analyticsSwitch').checked = (analytics === 'on' || analytics === null);
      if (platform) selectPlatform(platform);
    }

    /**
     * Saves current preferences, fires the 'play_clicked' analytics event,
     * and navigates to the appropriate game file based on the selected platform.
     * A short delay is added when an analytics endpoint is configured so the
     * fetch request has time to fire before the page unloads.
     */
    function launchGame() {
      savePrefs();
      trackEvent('play_clicked', {
        platform: selectedPlatform,
        music_variant: localStorage.getItem('nonex_music') !== 'off' ? 'on' : 'off',
        ab_music_group: localStorage.getItem('nonx_ab_music_group') || 'unknown',
        analytics_version: '3.0'
      });
      var dest = selectedPlatform === 'mobile' ? 'game_mobile.html' : 'game.html';
      // Delay navigation slightly so the analytics fetch can fire before unload
      setTimeout(function () { window.location.href = dest; }, ANALYTICS_ENDPOINT ? 120 : 0);
    }

    // Restore saved preferences and log the menu view on page load

    loadPrefs();

    // Fetch leaderboard immediately on page load (open by default)
    if (typeof window.firebaseGetTopScores === 'function') {
      window.firebaseGetTopScores().then(renderLeaderboard);
      leaderboardLoaded = true;
    } else {
      setTimeout(function () {
        if (typeof window.firebaseGetTopScores === 'function') {
          window.firebaseGetTopScores().then(renderLeaderboard);
        } else {
          var content = document.getElementById('leaderboardContent');
          if (content) content.innerHTML = "<div style='color:#aaa;font-size:13px;'>Leaderboard unavailable.</div>";
        }
        leaderboardLoaded = true;
      }, 1200);
    }

    trackEvent('menu_view', {
      referrer: document.referrer || 'direct',
      music_variant: localStorage.getItem('nonex_music') !== 'off' ? 'on' : 'off',
